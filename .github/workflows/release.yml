# Release — triggered when a version tag (v*) is pushed.
# Builds release binaries for all platforms, packages the VS Code extension,
# and creates a GitHub Release with every artifact attached.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write        # needed to create the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  # ───────────────────────────── build matrix ─────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ''
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ''

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so build.rs can read git info

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target != 'aarch64-apple-darwin' || runner.arch == 'ARM64'
        run: cargo test --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BIN="iris${{ matrix.ext }}"
          ARCHIVE="iris-${TAG}-${{ matrix.target }}"

          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${BIN}" staging/

          # Copy stdlib & examples alongside the binary
          cp -r stdlib staging/ 2>/dev/null || true
          cp -r examples staging/ 2>/dev/null || true
          cp LICENSE staging/

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${ARCHIVE}.zip" ./staging/*
            echo "ASSET=${ARCHIVE}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${ARCHIVE}.tar.gz" -C staging .
            echo "ASSET=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ─────────────────────────── VS Code extension ──────────────────────────
  extension:
    name: Package VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-iris
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-iris/*.vsix

  # ──────────────────────────── GitHub Release ────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo "## IRIS ${TAG}"
            echo ""
            echo "### Downloads"
            echo "| Platform | Archive |"
            echo "|----------|---------|"
            echo "| Windows x64 | \`iris-${TAG}-x86_64-pc-windows-msvc.zip\` |"
            echo "| Linux x64   | \`iris-${TAG}-x86_64-unknown-linux-gnu.tar.gz\` |"
            echo "| macOS x64   | \`iris-${TAG}-x86_64-apple-darwin.tar.gz\` |"
            echo "| macOS ARM64 | \`iris-${TAG}-aarch64-apple-darwin.tar.gz\` |"
            echo "| VS Code     | \`iris-lang-*.vsix\` (install via \`code --install-extension\`) |"
            echo ""
            echo "### Verify"
            echo "\`\`\`"
            echo "iris --version"
            echo "\`\`\`"
            echo ""
            echo "Full changelog: https://github.com/moon9t/iris/compare/...${TAG}"
          } > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.vsix
          generate_release_notes: true
          draft: false
          prerelease: false
