# Release — triggered when a version tag (v*) is pushed.
# Builds release binaries for all platforms, creates platform installers
# (.deb, .rpm, .pkg, .dmg, portable archives), packages the VS Code extension,
# generates SHA-256 checksums, signs artifacts, and creates a GitHub Release.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write        # needed to create the GitHub Release
  id-token: write        # needed for sigstore signing
  attestations: write    # needed for artifact attestations

env:
  CARGO_TERM_COLOR: always

jobs:
  # ───────────────────────────── build matrix ─────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ''
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ''

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1        # shallow clone – build.rs only needs HEAD

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Tests are run by the CI workflow; skip in release to avoid long
      # compilation time in --release mode.

      - name: Download LLVM toolchain
        shell: bash
        run: |
          # Download a minimal LLVM distribution (clang + lld) for the target.
          # We extract only the binaries needed for `iris build` (native compilation).
          LLVM_VER="18.1.8"
          LLVM_BASE="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VER}"

          mkdir -p toolchain-dl

          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)
              # Windows: LLVM provides a prebuilt zip/exe.  Use the win64 release.
              curl -fSL "${LLVM_BASE}/LLVM-${LLVM_VER}-win64.exe" -o toolchain-dl/llvm.exe
              # Extract with 7z (NSIS self-extractor)
              7z x toolchain-dl/llvm.exe -otoolchain-dl/llvm -y > /dev/null 2>&1 || true
              ;;
            aarch64-pc-windows-msvc)
              # Windows ARM64: use the woa64 build
              curl -fSL "${LLVM_BASE}/LLVM-${LLVM_VER}-woa64.exe" -o toolchain-dl/llvm.exe
              7z x toolchain-dl/llvm.exe -otoolchain-dl/llvm -y > /dev/null 2>&1 || true
              ;;
            x86_64-unknown-linux-gnu)
              curl -fSL "${LLVM_BASE}/clang+llvm-${LLVM_VER}-x86_64-linux-gnu-ubuntu-18.04.tar.xz" \
                -o toolchain-dl/llvm.tar.xz
              tar xf toolchain-dl/llvm.tar.xz -C toolchain-dl
              mv toolchain-dl/clang+llvm-* toolchain-dl/llvm
              ;;
            aarch64-unknown-linux-gnu)
              curl -fSL "${LLVM_BASE}/clang+llvm-${LLVM_VER}-aarch64-linux-gnu.tar.xz" \
                -o toolchain-dl/llvm.tar.xz
              tar xf toolchain-dl/llvm.tar.xz -C toolchain-dl
              mv toolchain-dl/clang+llvm-* toolchain-dl/llvm
              ;;
            x86_64-apple-darwin)
              # No prebuilt x86_64-apple-darwin on LLVM 18.1.8.
              # Runner is arm64; install x86_64 Homebrew + LLVM via Rosetta 2.
              arch -x86_64 /bin/bash -c 'NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
              arch -x86_64 /usr/local/bin/brew install --quiet llvm@18
              BREW_LLVM="$(arch -x86_64 /usr/local/bin/brew --prefix llvm@18)"
              mkdir -p toolchain-dl/llvm/bin toolchain-dl/llvm/lib
              cp -a "${BREW_LLVM}/bin/"* toolchain-dl/llvm/bin/ 2>/dev/null || true
              cp -a "${BREW_LLVM}/lib/"*.dylib toolchain-dl/llvm/lib/ 2>/dev/null || true
              ;;
            aarch64-apple-darwin)
              curl -fSL "${LLVM_BASE}/clang+llvm-${LLVM_VER}-arm64-apple-macos11.tar.xz" \
                -o toolchain-dl/llvm.tar.xz
              tar xf toolchain-dl/llvm.tar.xz -C toolchain-dl
              mv toolchain-dl/clang+llvm-* toolchain-dl/llvm
              ;;
          esac

          # Extract only the binaries we need: clang, lld (and their symlinks)
          mkdir -p toolchain/llvm/bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp toolchain-dl/llvm/bin/clang.exe    toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/clang++.exe   toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/clang-18.exe  toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/lld.exe       toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/ld.lld.exe    toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/lld-link.exe  toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/llvm-ar.exe   toolchain/llvm/bin/ 2>/dev/null || true
            # Copy required DLLs if present
            cp toolchain-dl/llvm/bin/*.dll          toolchain/llvm/bin/ 2>/dev/null || true
          else
            cp toolchain-dl/llvm/bin/clang      toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/clang++    toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/clang-18   toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/lld        toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/ld.lld     toolchain/llvm/bin/ 2>/dev/null || true
            cp toolchain-dl/llvm/bin/llvm-ar    toolchain/llvm/bin/ 2>/dev/null || true
            # Copy required shared libs
            mkdir -p toolchain/llvm/lib
            cp toolchain-dl/llvm/lib/libLLVM*.so*  toolchain/llvm/lib/ 2>/dev/null || true
            cp toolchain-dl/llvm/lib/libclang*.so* toolchain/llvm/lib/ 2>/dev/null || true
            cp toolchain-dl/llvm/lib/liblld*.so*   toolchain/llvm/lib/ 2>/dev/null || true
            cp toolchain-dl/llvm/lib/libLLVM*.dylib  toolchain/llvm/lib/ 2>/dev/null || true
            cp toolchain-dl/llvm/lib/libclang*.dylib toolchain/llvm/lib/ 2>/dev/null || true
          fi

          # Copy LLVM headers/libs needed for linking (MinGW sysroot on Windows)
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # Clang internal headers
            if [[ -d "toolchain-dl/llvm/lib/clang/${LLVM_VER}/include" ]]; then
              mkdir -p toolchain/llvm/lib/clang/${LLVM_VER}
              cp -r toolchain-dl/llvm/lib/clang/${LLVM_VER}/include toolchain/llvm/lib/clang/${LLVM_VER}/
            fi

            # Bundle MinGW ucrt64 sysroot from runner's MSYS2 installation.
            # Without this, clang cannot find standard C headers (stdint.h, etc).
            # Run in a subshell with set +e because Git Bash cp -R can fail on
            # MSYS2 symlinks / Windows paths in unexpected ways.
            (
              set +e   # disable errexit inside this block
              MSYS2_UCRT="C:/msys64/ucrt64"

              # Ensure mingw-w64 headers+libs are installed (runner may have a bare MSYS2).
              C:/msys64/usr/bin/pacman.exe -S --noconfirm --needed \
                mingw-w64-ucrt-x86_64-headers-git \
                mingw-w64-ucrt-x86_64-crt-git \
                mingw-w64-ucrt-x86_64-gcc-libs \
                mingw-w64-ucrt-x86_64-winpthreads-git 2>&1 || true

              if [[ -d "$MSYS2_UCRT/include" ]]; then
                echo "  Bundling MinGW ucrt64 sysroot..."

                # Headers — use robocopy (Windows-native, handles NTFS paths properly)
                mkdir -p toolchain/ucrt64/include
                # robocopy exit codes 0-7 = success; mask with (( )) to avoid bash error
                robocopy.exe "C:\\msys64\\ucrt64\\include" "toolchain\\ucrt64\\include" /E /NFL /NDL /NP /NJH /NJS 2>&1 || true

                # Verify headers were copied
                if [[ -f "toolchain/ucrt64/include/stdint.h" ]]; then
                  echo "  Headers copied OK"
                else
                  echo "  WARNING: Headers copy may have failed (stdint.h not found)"
                fi

                # Essential link libraries
                mkdir -p toolchain/ucrt64/lib
                for f in libmingw32.a libmingwex.a libmsvcrt.a libucrt.a \
                         libpthread.a libm.a libkernel32.a libuser32.a \
                         libadvapi32.a libshell32.a libws2_32.a libole32.a \
                         liboleaut32.a libuuid.a libmoldname.a \
                         crt2.o crtbegin.o crtend.o gcrt2.o dllcrt2.o \
                         libntdll.a libshlwapi.a libversion.a \
                         libgdi32.a libbcrypt.a libuserenv.a libiphlpapi.a; do
                  cp "$MSYS2_UCRT/lib/$f" toolchain/ucrt64/lib/ 2>/dev/null || true
                done

                # GCC CRT support files (crtbegin.o, libgcc.a, etc.)
                GCC_LIB_DIR=$(find "$MSYS2_UCRT/lib/gcc/x86_64-w64-mingw32" -maxdepth 1 -type d 2>/dev/null | sort -rV | head -1)
                if [[ -n "$GCC_LIB_DIR" ]]; then
                  GCC_VER=$(basename "$GCC_LIB_DIR")
                  mkdir -p "toolchain/ucrt64/lib/gcc/x86_64-w64-mingw32/$GCC_VER"
                  find "$GCC_LIB_DIR" -maxdepth 1 \( -name '*.o' -o -name '*.a' \) \
                    -exec cp {} "toolchain/ucrt64/lib/gcc/x86_64-w64-mingw32/$GCC_VER/" \; 2>/dev/null || true
                fi

                echo "  ucrt64 sysroot bundled: $(du -sh toolchain/ucrt64 2>/dev/null | awk '{print $1}')"
              else
                echo "  WARNING: MSYS2 ucrt64 include dir not found at $MSYS2_UCRT/include"
              fi
            ) || true  # ensure subshell failure never kills the step
          fi

          # Cleanup the large download
          rm -rf toolchain-dl

          echo "--- Toolchain contents ---"
          find toolchain -type f | head -30
          du -sh toolchain/

      - name: Prepare artifact
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BIN="iris${{ matrix.ext }}"
          ARCHIVE="iris-${TAG}-${{ matrix.target }}"

          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${BIN}" staging/

          # Copy stdlib & examples alongside the binary
          cp -r stdlib staging/ 2>/dev/null || true
          cp -r examples staging/ 2>/dev/null || true
          cp LICENSE staging/

          # Bundle the LLVM toolchain so releases are self-contained
          if [[ -d "toolchain" ]]; then
            cp -r toolchain staging/
            echo "  Bundled LLVM toolchain"
          fi

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${ARCHIVE}.zip" ./staging/*
            echo "ASSET=${ARCHIVE}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${ARCHIVE}.tar.gz" -C staging .
            echo "ASSET=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ─────────────────────── platform installers ────────────────────────────
  installers:
    name: Installers (${{ matrix.installer }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 .deb
          - installer: linux-x64-deb
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            format: deb
            arch: x86_64
          # Linux ARM64 .deb
          - installer: linux-arm64-deb
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            format: deb
            arch: aarch64
          # Linux x64 .rpm
          - installer: linux-x64-rpm
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            format: rpm
            arch: x86_64
          # Linux ARM64 .rpm
          - installer: linux-arm64-rpm
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            format: rpm
            arch: aarch64
          # macOS x64 .pkg
          - installer: macos-x64-pkg
            os: macos-latest
            target: x86_64-apple-darwin
            format: pkg
            arch: x86_64
          # macOS ARM64 .pkg
          - installer: macos-arm64-pkg
            os: macos-latest
            target: aarch64-apple-darwin
            format: pkg
            arch: aarch64
          # macOS x64 .dmg
          - installer: macos-x64-dmg
            os: macos-latest
            target: x86_64-apple-darwin
            format: dmg
            arch: x86_64
          # macOS ARM64 .dmg
          - installer: macos-arm64-dmg
            os: macos-latest
            target: aarch64-apple-darwin
            format: dmg
            arch: aarch64
          # Windows x64 portable .zip
          - installer: windows-x64-portable
            os: windows-latest
            target: x86_64-pc-windows-msvc
            format: portable
            arch: x86_64
          # Windows ARM64 portable .zip
          - installer: windows-arm64-portable
            os: windows-latest
            target: aarch64-pc-windows-msvc
            format: portable
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: build-artifact

      - name: Extract binary from artifact
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

          mkdir -p extracted
          ARTIFACT=$(ls build-artifact/)
          if [[ "$ARTIFACT" == *.tar.gz ]]; then
            tar xzf "build-artifact/$ARTIFACT" -C extracted
          elif [[ "$ARTIFACT" == *.zip ]]; then
            cd build-artifact && 7z x "$ARTIFACT" -o../extracted && cd ..
          fi

          # Find the iris binary
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN=$(find extracted -name 'iris.exe' -type f | head -1)
          else
            BIN=$(find extracted -name 'iris' -type f ! -name '*.iris' | head -1)
          fi

          if [ -z "$BIN" ]; then
            echo "ERROR: Could not find iris binary in artifact"
            ls -laR extracted/
            exit 1
          fi

          mkdir -p target/release
          cp "$BIN" "target/release/"
          chmod +x "target/release/iris" 2>/dev/null || true

          # Extract the bundled LLVM toolchain so installer scripts can package it.
          if [[ -d "extracted/toolchain" ]]; then
            cp -r extracted/toolchain toolchain
            echo "  Toolchain extracted ($(du -sh toolchain | awk '{print $1}'))"
          fi

      # ── Linux .deb ──
      - name: Build .deb package
        if: matrix.format == 'deb'
        run: |
          chmod +x installer/linux/build-deb.sh
          bash installer/linux/build-deb.sh \
            --version "$VERSION" --arch "${{ matrix.arch }}"

      # ── Linux .rpm ──
      - name: Install rpmbuild
        if: matrix.format == 'rpm'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build .rpm package
        if: matrix.format == 'rpm'
        run: |
          chmod +x installer/linux/build-rpm.sh
          bash installer/linux/build-rpm.sh \
            --version "$VERSION" --arch "${{ matrix.arch }}"

      # ── macOS .pkg ──
      - name: Build .pkg installer
        if: matrix.format == 'pkg'
        run: |
          chmod +x installer/macos/build-pkg.sh
          bash installer/macos/build-pkg.sh --version "$VERSION"

      # ── macOS .dmg ──
      - name: Build .dmg image
        if: matrix.format == 'dmg'
        run: |
          chmod +x installer/macos/build-dmg.sh
          bash installer/macos/build-dmg.sh --version "$VERSION"

      # ── Windows portable .zip ──
      - name: Build portable .zip
        if: matrix.format == 'portable'
        shell: pwsh
        run: |
          & installer\windows\build_portable.ps1 `
            -Version $env:VERSION -SkipBuild

      - name: Collect installer output
        shell: bash
        run: |
          mkdir -p installer-output
          find installer/dist -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' \
               -o -name '*.dmg' -o -name '*portable*.zip' \) \
            -exec cp {} installer-output/ \;

          echo "--- Installer artifacts ---"
          ls -lh installer-output/

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.installer }}
          path: installer-output/*

  # ─────────────────────────── VS Code extension ──────────────────────────
  extension:
    name: Package VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-iris
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-iris/*.vsix

  # ──────────────────────────── GitHub Release ────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, installers, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd artifacts
          # Collect all release files into one directory
          mkdir -p ../release-files
          find . -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.vsix' \
            -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name '*.dmg' \) \
            -exec cp {} ../release-files/ \;
          cd ../release-files
          sha256sum * > SHA256SUMS.txt
          echo "--- SHA-256 Checksums ---"
          cat SHA256SUMS.txt

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          {
            echo "## IRIS ${TAG}"
            echo ""
            echo "### Binary Archives"
            echo "| Platform | Archive |"
            echo "|----------|---------|"
            echo "| Windows x64   | \`iris-${TAG}-x86_64-pc-windows-msvc.zip\` |"
            echo "| Windows ARM64 | \`iris-${TAG}-aarch64-pc-windows-msvc.zip\` |"
            echo "| Linux x64     | \`iris-${TAG}-x86_64-unknown-linux-gnu.tar.gz\` |"
            echo "| Linux ARM64   | \`iris-${TAG}-aarch64-unknown-linux-gnu.tar.gz\` |"
            echo "| macOS x64     | \`iris-${TAG}-x86_64-apple-darwin.tar.gz\` |"
            echo "| macOS ARM64   | \`iris-${TAG}-aarch64-apple-darwin.tar.gz\` |"
            echo ""
            echo "### Platform Installers"
            echo "| Platform | Installer | Install command |"
            echo "|----------|-----------|-----------------|"
            echo "| Linux x64   | \`iris_${VERSION}_x86_64.deb\` | \`sudo dpkg -i iris_${VERSION}_x86_64.deb\` |"
            echo "| Linux ARM64 | \`iris_${VERSION}_aarch64.deb\` | \`sudo dpkg -i iris_${VERSION}_aarch64.deb\` |"
            echo "| Linux x64   | \`iris-${VERSION}-1.x86_64.rpm\` | \`sudo rpm -i iris-${VERSION}-1.x86_64.rpm\` |"
            echo "| Linux ARM64 | \`iris-${VERSION}-1.aarch64.rpm\` | \`sudo rpm -i iris-${VERSION}-1.aarch64.rpm\` |"
            echo "| macOS x64   | \`IRIS-${VERSION}-macos-x86_64.pkg\` | Double-click or \`sudo installer -pkg ... -target /\` |"
            echo "| macOS ARM64 | \`IRIS-${VERSION}-macos-aarch64.pkg\` | Double-click or \`sudo installer -pkg ... -target /\` |"
            echo "| macOS x64   | \`IRIS-${VERSION}-macos-x86_64.dmg\` | Mount and run Install script |"
            echo "| macOS ARM64 | \`IRIS-${VERSION}-macos-aarch64.dmg\` | Mount and run Install script |"
            echo "| Windows x64 | \`IRIS-${VERSION}-windows-x86_64-portable.zip\` | Extract and add to PATH |"
            echo "| Windows ARM64 | \`IRIS-${VERSION}-windows-aarch64-portable.zip\` | Extract and add to PATH |"
            echo ""
            echo "### VS Code Extension"
            echo "\`\`\`bash"
            echo "code --install-extension iris-lang-*.vsix"
            echo "\`\`\`"
            echo ""
            echo "### One-line install (downloads latest)"
            echo "**Linux:**"
            echo "\`\`\`bash"
            echo "curl -fsSL https://raw.githubusercontent.com/moon9t/iris/${TAG}/installer/linux/install.sh | bash"
            echo "\`\`\`"
            echo "**macOS:**"
            echo "\`\`\`bash"
            echo "curl -fsSL https://raw.githubusercontent.com/moon9t/iris/${TAG}/installer/macos/install.sh | bash"
            echo "\`\`\`"
            echo ""
            echo "### Verify integrity"
            echo "Download \`SHA256SUMS.txt\` and verify:"
            echo "\`\`\`bash"
            echo "sha256sum -c SHA256SUMS.txt"
            echo "\`\`\`"
            echo ""
            echo "### Quick start"
            echo "\`\`\`"
            echo "iris --version"
            echo "\`\`\`"
            echo ""
            echo "Full changelog: https://github.com/moon9t/iris/compare/...${TAG}"
          } > release_body.md

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'release-files/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            release-files/*.zip
            release-files/*.tar.gz
            release-files/*.vsix
            release-files/*.deb
            release-files/*.rpm
            release-files/*.pkg
            release-files/*.dmg
            release-files/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
