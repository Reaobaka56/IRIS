# CI — runs on every push and pull request
# Builds the compiler, runs all tests, and checks formatting.
# Supports x86_64 and ARM64 on Linux, Windows, and macOS.

name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 targets (native)
          - os: Linux
            runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: Windows
            runner: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: macOS
            runner: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          # ARM64 targets
          - os: macOS
            runner: macos-14
            arch: arm64
            target: aarch64-apple-darwin
          - os: Linux
            runner: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: Windows
            runner: windows-latest
            arch: arm64
            target: aarch64-pc-windows-msvc
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.runner }}-${{ matrix.target }}-cargo-

      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Build (cross-compile)
        if: ${{ matrix.cross }}
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Run tests
        if: ${{ !matrix.cross }}
        run: cargo test --verbose --target ${{ matrix.target }}

      - name: Run tests (cross — build only)
        if: ${{ matrix.cross }}
        run: echo "Cross-compiled target — tests run on native runners only"

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --all-targets -- -D warnings

  extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-iris
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run compile
      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-iris/*.vsix

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: cargo build --release
      - name: Run benchmarks
        run: |
          for f in examples/fibonacci.iris examples/factorial.iris examples/sorting.iris examples/fizzbuzz.iris; do
            if [ -f "$f" ]; then
              echo "=== Benchmarking $f ==="
              cargo run --release -- bench "$f" -n 20 || true
              echo ""
            fi
          done
