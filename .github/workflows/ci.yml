# CI — runs on every push and pull request
# Builds the compiler, runs all tests, and checks formatting.
# Supports x86_64 and ARM64 on Linux, Windows, and macOS.

name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 targets (native)
          - os: Linux
            runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: Windows
            runner: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: macOS
            runner: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          # ARM64 targets
          - os: macOS
            runner: macos-14
            arch: arm64
            target: aarch64-apple-darwin
          - os: Linux
            runner: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: Windows
            runner: windows-latest
            arch: arm64
            target: aarch64-pc-windows-msvc
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.runner }}-${{ matrix.target }}-cargo-

      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Build (cross-compile)
        if: ${{ matrix.cross }}
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Run tests
        if: ${{ !matrix.cross }}
        run: cargo test --verbose --target ${{ matrix.target }}

      - name: Run tests (cross — build only)
        if: ${{ matrix.cross }}
        run: echo "Cross-compiled target — tests run on native runners only"

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --all-targets -- -D warnings

  extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-iris
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run compile
      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-iris/*.vsix

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: cargo build --release

      - name: Run benchmarks and collect results
        run: |
          mkdir -p bench-results
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT=$(git rev-parse --short HEAD)
          echo "{ \"timestamp\": \"${TIMESTAMP}\", \"commit\": \"${COMMIT}\", \"benchmarks\": [" > bench-results/results.json
          FIRST=true
          for f in benches/*.iris examples/fibonacci.iris examples/factorial.iris examples/sorting.iris examples/fizzbuzz.iris; do
            if [ -f "$f" ]; then
              BENCH_NAME=$(basename "$f" .iris)
              echo "=== Benchmarking $f ==="
              OUTPUT=$(cargo run --release -- bench "$f" -n 20 2>&1 || true)
              # Extract the mean time in ms (the bench command prints it)
              MEAN=$(echo "$OUTPUT" | grep -oP '[\d.]+\s*ms' | head -1 | grep -oP '[\d.]+' || echo "0")
              if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> bench-results/results.json; fi
              echo "  { \"name\": \"${BENCH_NAME}\", \"mean_ms\": ${MEAN:-0} }" >> bench-results/results.json
              echo "$OUTPUT"
              echo ""
            fi
          done
          echo "] }" >> bench-results/results.json
          cat bench-results/results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: bench-results/
          retention-days: 90

      - name: Download previous benchmark baseline
        uses: actions/cache@v4
        id: bench-baseline
        with:
          path: bench-baseline/
          key: bench-baseline-${{ runner.os }}
          restore-keys: bench-baseline-

      - name: Check for performance regressions
        run: |
          if [ -f bench-baseline/results.json ]; then
            echo "=== Comparing against baseline ==="
            python3 -c "
          import json, sys
          with open('bench-baseline/results.json') as f:
              baseline = {b['name']: b['mean_ms'] for b in json.load(f)['benchmarks']}
          with open('bench-results/results.json') as f:
              current = {b['name']: b['mean_ms'] for b in json.load(f)['benchmarks']}
          regression = False
          for name, cur in sorted(current.items()):
              base = baseline.get(name)
              if base and base > 0:
                  pct = ((cur - base) / base) * 100
                  status = 'REGRESSION' if pct > 15 else ('improved' if pct < -5 else 'ok')
                  if status == 'REGRESSION':
                      regression = True
                  print(f'  {name:20s}  base={base:8.2f}ms  now={cur:8.2f}ms  {pct:+.1f}%  [{status}]')
              else:
                  print(f'  {name:20s}  new benchmark  now={cur:.2f}ms')
          if regression:
              print()
              print('WARNING: Performance regression detected (>15% slower)')
              print('Review the benchmarks above before merging.')
              sys.exit(1)
          else:
              print()
              print('All benchmarks within acceptable range.')
          "
          else
            echo "No baseline found — this run becomes the baseline."
          fi

      - name: Update baseline
        run: |
          mkdir -p bench-baseline
          cp bench-results/results.json bench-baseline/results.json

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
            fuzz/corpus
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
      - name: Fuzz lexer (60s)
        run: cargo +nightly fuzz run fuzz_lexer -- -max_total_time=60 -max_len=4096
      - name: Fuzz parser (60s)
        run: cargo +nightly fuzz run fuzz_parser -- -max_total_time=60 -max_len=4096
      - name: Fuzz lowerer (60s)
        run: cargo +nightly fuzz run fuzz_lowerer -- -max_total_time=60 -max_len=4096
      - name: Fuzz full compiler (60s)
        run: cargo +nightly fuzz run fuzz_compiler -- -max_total_time=60 -max_len=4096
      - name: Upload fuzz corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ github.sha }}
          path: fuzz/corpus/
          retention-days: 30
